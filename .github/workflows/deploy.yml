name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build shadow JAR
        run: ./gradlew :server:shadowJar --no-daemon

      - name: Deploy to server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Ensure dedicated service user exists
          ssh -i ~/.ssh/deploy_key root@"$HOST" \
            'id -u meico-tools &>/dev/null || useradd -r -s /usr/sbin/nologin -d /opt/meico-tools meico-tools'

          # Deploy JAR and systemd unit
          scp -i ~/.ssh/deploy_key server/build/libs/server-all.jar root@"$HOST":/opt/meico-tools/meico-tools.jar
          scp -i ~/.ssh/deploy_key server/meico-tools.service root@"$HOST":/etc/systemd/system/meico-tools.service

          # Set ownership and restart
          ssh -i ~/.ssh/deploy_key root@"$HOST" \
            'chown -R meico-tools:meico-tools /opt/meico-tools && systemctl daemon-reload && systemctl enable meico-tools && systemctl restart meico-tools'
